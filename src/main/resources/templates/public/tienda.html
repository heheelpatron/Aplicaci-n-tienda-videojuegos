<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tienda – La Cueva del Jugón</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #ccc; }
        .header { background: #1a1a2e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e94560; position: sticky; top: 0; z-index: 100; }
        .logo { color: #e94560; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; }
        nav a { color: #ccc; text-decoration: none; margin-left: 1.5rem; font-size: 0.9rem; }
        nav a:hover { color: #e94560; }

        .tienda-layout { display: flex; max-width: 1400px; margin: 0 auto; padding: 2rem; gap: 2rem; }

        /* FILTROS SIDEBAR */
        .filtros {
            width: 220px; flex-shrink: 0; background: #1a1a2e; border-radius: 12px;
            padding: 1.5rem; border: 1px solid #2a2a40; height: fit-content;
        }
        .filtros h3 { color: #e94560; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; }
        .filtro-group { margin-bottom: 1.5rem; }
        .filtro-group h4 { color: #fff; font-size: 0.85rem; margin-bottom: 0.6rem; }
        .filtro-group a { display: block; color: #888; font-size: 0.85rem; text-decoration: none; padding: 0.3rem 0; transition: color 0.2s; }
        .filtro-group a:hover, .filtro-group a.selected { color: #e94560; }
        .clear-link { display: block; color: #555; font-size: 0.8rem; margin-top: 1rem; text-decoration: none; }
        .clear-link:hover { color: #e94560; }

        /* RESULTADOS */
        .resultados { flex: 1; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .results-header h2 { color: #fff; font-size: 1.3rem; }
        .results-count { color: #666; font-size: 0.85rem; }

        /* BUSCADOR */
        .search-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .search-form input { flex: 1; padding: 0.7rem 1rem; border-radius: 8px; border: 1px solid #2a2a40; background: #1a1a2e; color: #fff; font-size: 0.9rem; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 8px; font-size: 0.85rem; cursor: pointer; text-decoration: none; border: none; font-weight: bold; }
        .btn-primary { background: #e94560; color: white; }

        .grid-juegos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem; }
        .juego-card { background: #1a1a2e; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a40; transition: transform 0.3s, border-color 0.3s; text-decoration: none; color: inherit; display: block; }
        .juego-card:hover { transform: translateY(-4px); border-color: #e94560; }
        .card-body { padding: 1.2rem; }
        .card-body .genero { color: #888; font-size: 0.75rem; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 1px; }
        .card-body h3 { color: #fff; font-size: 0.95rem; margin-bottom: 0.4rem; line-height: 1.3; }
        .card-body .plataforma { color: #555; font-size: 0.75rem; margin-bottom: 0.8rem; }
        .card-body .precio { color: #e94560; font-weight: bold; font-size: 1.2rem; }
        .card-body .stock { font-size: 0.75rem; color: #666; margin-top: 0.3rem; }
        .card-body .stock.bajo { color: #e94560; }

        .footer { background: #1a1a2e; padding: 2rem; text-align: center; border-top: 1px solid #2a2a40; color: #555; font-size: 0.85rem; margin-top: 3rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">LA CUEVA DEL JUGÓN</div>
        <nav>
            <a href="/">Inicio</a>
            <a href="/tienda">Tienda</a>
            <a href="/login">Admin</a>
        </nav>
    </header>

    <div class="tienda-layout">

        <!-- SIDEBAR FILTROS -->
        <aside class="filtros">
            <h3>Filtros</h3>

            <div class="filtro-group">
                <h4>Géneros</h4>
                <a th:each="g : ${generos}"
                   th:href="@{/tienda(genero=${g})}"
                   th:text="${g}"
                   th:classappend="${g == generoSeleccionado ? 'selected' : ''}"></a>
            </div>

            <div class="filtro-group">
                <h4>Plataformas</h4>
                <a th:each="p : ${plataformas}"
                   th:href="@{/tienda(plataforma=${p})}"
                   th:text="${p}"
                   th:classappend="${p == plataformaSeleccionada ? 'selected' : ''}"></a>
            </div>

            <a href="/tienda" class="clear-link">✕ Quitar filtros</a>
        </aside>

        <!-- RESULTADOS -->
        <div class="resultados">
            <form class="search-form" method="get" th:action="@{/tienda}">
                <input type="text" name="buscar" placeholder="Buscar juego..." th:value="${buscar}">
                <button type="submit" class="btn btn-primary">Buscar</button>
            </form>

            <div class="results-header">
                <h2>Catálogo</h2>
                <span class="results-count" th:text="${#lists.size(juegos)} + ' juegos encontrados'"></span>
            </div>

            <div class="grid-juegos">
                <a class="juego-card"
                   th:each="j : ${juegos}"
                   th:href="@{/juego/{id}(id=${j.idJuego})}">
                    <div class="card-body">
                        <div class="genero" th:text="${j.genero}"></div>
                        <h3 th:text="${j.titulo}"></h3>
                        <div class="plataforma" th:text="${j.plataforma ?: ''}"></div>
                        <div class="precio" th:text="${#numbers.formatDecimal(j.precio, 1, 2)} + ' €'"></div>
                        <div class="stock"
                             th:classappend="${j.stock <= 5 ? 'bajo' : ''}"
                             th:text="${j.stock > 0 ? j.stock + ' en stock' : 'Sin stock'}"></div>
                    </div>
                </a>
            </div>

            <div th:if="${#lists.isEmpty(juegos)}"
                 style="text-align:center; padding: 3rem; color: #555;">
                No se encontraron juegos con ese criterio.
            </div>
        </div>
    </div>

    <footer class="footer">
        © 2026 La Cueva del Jugón · angelropozo51@gmail.com
    </footer>

</body>
</html>
