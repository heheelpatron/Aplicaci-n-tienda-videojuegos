<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${juego.titulo} + ' – La Cueva del Jugón'">Juego</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #ccc; }
        .header { background: #1a1a2e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e94560; }
        .logo { color: #e94560; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; }
        nav a { color: #ccc; text-decoration: none; margin-left: 1.5rem; font-size: 0.9rem; }
        nav a:hover { color: #e94560; }

        .container { max-width: 800px; margin: 3rem auto; padding: 0 2rem; }
        .back { color: #e94560; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 2rem; }
        .back:hover { text-decoration: underline; }

        .detail-card {
            background: #1a1a2e; border-radius: 16px; padding: 2.5rem;
            border: 1px solid #2a2a40;
        }
        .badge-genero {
            display: inline-block; background: #e94560; color: white;
            padding: 0.3rem 0.9rem; border-radius: 20px; font-size: 0.75rem;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem;
        }
        h1 { color: #fff; font-size: 2rem; margin-bottom: 0.5rem; }
        .plataforma { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        .info-box { background: #0f0f1a; border-radius: 10px; padding: 1.2rem; text-align: center; border: 1px solid #2a2a40; }
        .info-box .val { font-size: 1.8rem; font-weight: bold; color: #e94560; }
        .info-box .lbl { font-size: 0.75rem; color: #777; margin-top: 0.3rem; text-transform: uppercase; }

        .footer { background: #1a1a2e; padding: 2rem; text-align: center; border-top: 1px solid #2a2a40; color: #555; font-size: 0.85rem; margin-top: 4rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">LA CUEVA DEL JUGÓN</div>
        <nav>
            <a href="/">Inicio</a>
            <a href="/tienda">Tienda</a>
            <a href="/login">Admin</a>
        </nav>
    </header>

    <div class="container">
        <a href="/tienda" class="back">← Volver a la tienda</a>

        <div class="detail-card">
            <span class="badge-genero" th:text="${juego.genero}"></span>
            <h1 th:text="${juego.titulo}"></h1>
            <div class="plataforma" th:text="${juego.plataforma ?: 'Multiplataforma'}"></div>

            <div class="info-grid">
                <div class="info-box">
                    <div class="val" th:text="${#numbers.formatDecimal(juego.precio, 1, 2)} + ' €'"></div>
                    <div class="lbl">Precio</div>
                </div>
                <div class="info-box">
                    <div class="val"
                         th:style="${juego.stock <= 5 ? 'color:#e94560' : 'color:#4caf50'}"
                         th:text="${juego.stock}"></div>
                    <div class="lbl">Unidades en stock</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        © 2026 La Cueva del Jugón · angelropozo51@gmail.com
    </footer>

</body>
</html>
